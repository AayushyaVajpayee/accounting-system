name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      # Docker-in-Docker is available on ubuntu-latest by default,
      # which is required for testcontainers to spin up PostgreSQL.
      # No explicit service needed — testcontainers manages the container lifecycle.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            accounting_system_rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('accounting_system_rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests (excluding storage_service S3 test)
        working-directory: accounting_system_rust
        env:
          # Environment expected by accounting_system tests (host must be localhost in CI)
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          POSTGRES_HOST: localhost
          POSTGRES_MAX_CONNECTIONS: "5"
          POSTGRES_APP_DB: accounting_system
          POSTGRES_connect_timeout_seconds: "10"
          POSTGRES_WAIT_TIMEOUT_SECONDS: "5"
          POSTGRES_POOL_RECYCLING_METHOD: Clean
          POSTGRES_APPLICATION_NAME: accounting-system
        run: cargo test --workspace --exclude storage_service

      - name: Run storage_service tests
        if: ${{ vars.RUN_S3_TESTS == 'true' }}
        working-directory: accounting_system_rust
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: cargo test -p storage_service

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            accounting_system_rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('accounting_system_rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run clippy
        working-directory: accounting_system_rust
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: accounting_system_rust
        run: cargo fmt --all -- --check
